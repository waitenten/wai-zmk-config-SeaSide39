CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=40
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=20
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y

# ZMK公式マウス・インプット機能の有効化
CONFIG_ZMK_MOUSE=y
CONFIG_SPI=y
CONFIG_INPUT=y

# ========================================================
# PMW3610 ドライバ設定（通常版・ALT版の両方を安全に定義）
# ========================================================

# 1. 通常版用の設定
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=800
CONFIG_PMW3610_ORIENTATION_0=y
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_Y=n

# 2. ALT版用の設定
CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_CPI=800
CONFIG_PMW3610_ALT_ORIENTATION_0=y
CONFIG_PMW3610_ALT_INVERT_X=n
CONFIG_PMW3610_ALT_INVERT_Y=n

# 起動時のハードウェア初期化スタック対策ディレイ
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000
